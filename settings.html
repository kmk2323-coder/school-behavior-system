<style>
:root{--navy:#0B2545;--navy2:#163A6B;--gold:#C9913A;--bg:#F0F2F8;--surface:#fff;--surface2:#F5F7FC;--surface3:#ECEEF7;--border:#DDE1F0;--border2:#C8CEDF;--text1:#0B1A2E;--text2:#4A5578;--text3:#8892B0;--blue:#1A56DB;--blue-l:#EBF0FF;--green:#0A7A4A;--green-l:#E8F9F1;--red:#B91C1C;--red-l:#FEF2F2;--amber:#B05E0A;--amber-l:#FFF5E6;--r:10px;--r-sm:6px;--sh:0 2px 12px rgba(11,37,69,.08)}

body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--text1);font-size:14px;min-height:100vh;display:flex}
.sb{width:230px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;right:0;bottom:0;z-index:100}
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(255,255,255,.08);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:38px;height:38px;background:linear-gradient(135deg,var(--gold),#E8B85A);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-name{font-size:12px;font-weight:700;color:white}.sb-logo-sub{font-size:10px;color:rgba(255,255,255,.45);margin-top:1px}
.sb-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:10px}
.sb-av{width:36px;height:36px;border-radius:50%;background:rgba(201,145,58,.25);border:1.5px solid rgba(201,145,58,.4);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#E8B85A;flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600;color:white}.sb-urole{font-size:11px;color:rgba(255,255,255,.5)}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.sb-sec-lbl{font-size:9px;font-weight:700;color:rgba(255,255,255,.3);padding:4px 8px 6px;letter-spacing:1px}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;color:rgba(255,255,255,.6);font-size:13px;font-weight:500;transition:all .15s;margin-bottom:2px;position:relative}
.sb-item:hover{background:rgba(255,255,255,.08);color:white}
.sb-item.active{background:rgba(255,255,255,.12);color:white}
.sb-item.active::before{content:'';position:absolute;right:0;top:6px;bottom:6px;width:3px;background:#E8B85A;border-radius:0 3px 3px 0}
.sb-icon{font-size:16px;width:20px;text-align:center;flex-shrink:0}
.sb-footer{padding:10px;border-top:1px solid rgba(255,255,255,.07)}
.sb-logout{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:var(--r-sm);cursor:pointer;color:rgba(255,255,255,.5);font-size:13px;transition:all .15s}
.sb-logout:hover{color:#FC8181;background:rgba(252,129,129,.08)}
.main{margin-right:230px;flex:1;display:flex;flex-direction:column}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.tb-left h1{font-size:15px;font-weight:700}.tb-left p{font-size:11px;color:var(--text3);margin-top:2px}
.content{padding:20px 24px;flex:1}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;margin-bottom:16px}
.card-header{padding:13px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:12px}
.card-title{font-size:14px;font-weight:700}.card-sub{font-size:11px;color:var(--text3);margin-top:2px}
.form-group{margin-bottom:12px}.form-lbl{font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;display:block}
.form-ctrl{width:100%;padding:8px 12px;border-radius:var(--r-sm);border:1.5px solid var(--border2);background:var(--surface2);font-family:'Cairo',sans-serif;font-size:13px;color:var(--text1);outline:none;direction:rtl;transition:all .15s}
.form-ctrl:focus{border-color:var(--navy2);background:white;box-shadow:0 0 0 3px rgba(11,37,69,.1)}
.form-grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
.btn{padding:8px 16px;border-radius:var(--r-sm);font-family:'Cairo',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;border:none;display:inline-flex;align-items:center;gap:6px}
.btn-navy{background:var(--navy);color:white}.btn-navy:hover{background:var(--navy2)}

.btn-outline{background:var(--surface);color:var(--text2);border:1.5px solid var(--border2)}.btn-outline:hover{background:var(--surface2);border-color:var(--navy);color:var(--navy)}

.drop-zone{border:2px dashed var(--border2);border-radius:var(--r);padding:26px 20px;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}

.toggle{width:42px;height:24px;border-radius:12px;background:var(--border2);position:relative;cursor:pointer;transition:background .2s;flex-shrink:0}
.toggle.on{background:var(--navy)}
.toggle::after{content:'';position:absolute;width:18px;height:18px;background:white;border-radius:50%;top:3px;right:3px;transition:transform .2s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
.toggle.on::after{transform:translateX(-18px)}
.chip{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.chip-green{background:var(--green-l);color:var(--green)}.chip-blue{background:var(--blue-l);color:var(--blue)}.chip-amber{background:var(--amber-l);color:var(--amber)}.chip-red{background:var(--red-l);color:var(--red)}.chip-navy{background:#E8EDF7;color:var(--navy)}
.tbl{width:100%;border-collapse:collapse}.tbl th{background:var(--surface3);padding:9px 14px;font-size:11px;font-weight:600;color:var(--text2);text-align:right;border-bottom:1px solid var(--border)}.tbl td{padding:9px 14px;border-bottom:1px solid var(--border);font-size:13px;vertical-align:middle}.tbl tr:last-child td{border-bottom:none}
#toast{position:fixed;bottom:20px;left:20px;background:var(--navy);color:white;padding:11px 18px;border-radius:var(--r-sm);font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(11,37,69,.3);z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:340px}
#toast.show{transform:translateY(0);opacity:1}#toast.ok{background:var(--green)}#toast.err{background:var(--red)}
@media(max-width:900px){.sb{display:none}.main{margin-right:0}.form-grid-2,.form-grid-3{grid-template-columns:1fr}}
</style>

function switchTab(tab){
  ['school','upload','users','system'].forEach(t=>{const el=document.getElementById('sbt-'+t);if(el)el.classList.toggle('active',t===tab);});
  const titles={school:'بيانات المدرسة',upload:'رفع البيانات',users:'المستخدمون',system:'الإعدادات العامة'};
  document.getElementById('tb-title').textContent=titles[tab]||tab;
  if(tab==='school')renderSchool();else if(tab==='upload')renderUpload();else if(tab==='users')renderUsers();else if(tab==='system')renderSystem();
}

async function saveSchool(){
  const data={nameAr:document.getElementById('sch-name-ar').value,nameEn:document.getElementById('sch-name-en').value,ministry:document.getElementById('sch-ministry').value,year:document.getElementById('sch-year').value,principalName:document.getElementById('sch-principal').value,vpAcademic:document.getElementById('sch-vp-academic').value,vpAdmin:document.getElementById('sch-vp-admin').value,phone:document.getElementById('sch-phone').value};

function renderUpload(){
  document.getElementById('content').innerHTML=`
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px">
      ${[
        {key:'students',icon:'🎒',title:'بيانات الطلاب',note:'الأعمدة: رقم الطالب، الاسم، الصف، الفصل، الهوية، هاتف ولي الأمر'},
        {key:'teachers',icon:'👨‍🏫',title:'بيانات المعلمين',note:'الأعمدة: الرقم الوظيفي، الاسم، اسم المستخدم، كلمة المرور، البريد، التخصص، الفصول'},
        {key:'staff',icon:'👮',title:'الكادر الإداري',note:'الأعمدة: الرقم الوظيفي، الاسم، الدور، اسم المستخدم، كلمة المرور، البريد'},

function dzo(e,k){e.preventDefault();document.getElementById('dz-'+k)?.classList.add('over');}
function dzl(k){document.getElementById('dz-'+k)?.classList.remove('over');}
function dzd(e,k){e.preventDefault();dzl(k);const f=e.dataTransfer.files[0];if(f)processCSV(f,k);}
function handleFile(inp,k){if(inp.files[0])processCSV(inp.files[0],k);}

async function processCSV(file,type){
  const title=document.getElementById('dz-title-'+type);
  const status=document.getElementById('us-'+type);
  const prog=document.getElementById('prog-'+type);
  const fill=document.getElementById('fill-'+type);
  if(title)title.textContent='📄 '+file.name;
  status.className='upload-status';status.textContent='';
  prog.style.display='block';fill.style.width='0%';
  const reader=new FileReader();
  reader.onload=async e=>{
    try{
      fill.style.width='40%';
      let text=e.target.result.replace(/^\uFEFF/,'');
      const lines=text.split(/\r?\n/).filter(l=>l.trim());
      if(lines.length<2)throw new Error('الملف فارغ أو غير صحيح');
      const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,''));
      const rows=[];
      for(let i=1;i<lines.length;i++){
        const vals=smartSplit(lines[i]);
        if(vals.length<2)continue;
        const obj={};
        headers.forEach((h,idx)=>{obj[h]=vals[idx]?.trim().replace(/^"|"$/g,'')||'';});
        rows.push(obj);
      }
      fill.style.width='70%';
      if(!window.$fbReady)throw new Error('Firebase غير متصل');
      let saved=0;
      if(type==='students'){
        const mapped=rows.map(r=>({id:r['رقم الطالب']||r['id']||`s_${Date.now()}`,name:r['الاسم الكامل']||r['الاسم']||'',grade:r['الصف']||'',classId:r['الفصل']||'',nationalId:r['رقم الهوية']||'',parentPhone:r['رقم هاتف ولي الأمر']||'',parentName:r['اسم ولي الأمر']||'',notes:r['ملاحظات']||'',violationCount:0,active:true}));
        await Promise.all(mapped.map(s=>window.$fb.setDoc(window.$fb.doc(window.$db,'students',String(s.id)),{...s,updatedAt:window.$fb.serverTimestamp()},{merge:true})));
        saved=mapped.length;
      }else{
        const roleMap={director:'director',vp_academic:'psychologist',vp_admin:'psychologist',supervisor:'supervisor',supervisor1:'supervisor',supervisor2:'supervisor',social:'social',social1:'social',psycho:'psychologist',psycho1:'psychologist',teacher:'teacher'};
        const mapped=rows.map(r=>({id:r['الرقم الوظيفي']||r['id']||`u_${Date.now()}`,name:r['الاسم الكامل']||r['الاسم']||'',username:r['كلمة المرور']||r['username']||'',password:r['كلمة المرور']||r['password']||'',email:r['البريد الإلكتروني']||r['email']||'',role:roleMap[r['الدور']||r['role']]||'teacher',phone:r['رقم الجوال']||r['phone']||'',active:true}));
        await Promise.all(mapped.map(u=>window.$fb.setDoc(window.$fb.doc(window.$db,'users',String(u.id)),{...u,updatedAt:window.$fb.serverTimestamp()},{merge:true})));
        saved=mapped.length;
      }
      fill.style.width='100%';
      status.className='upload-status ok';status.textContent=`✅ تم استيراد ${saved} سجل بنجاح`;
      addLogRow(type,file.name,saved);
      toast(`✅ ${saved} سجل رُفع لـ Firebase`,'ok');
    }catch(err){
      fill.style.width='100%';
      status.className='upload-status err';status.textContent='❌ '+err.message;
      toast('❌ '+err.message,'err');
    }
  };
  reader.readAsText(file,'UTF-8');
}

function smartSplit(line){
  const r=[];let c='';let inQ=false;
  for(const ch of line){if(ch==='"')inQ=!inQ;else if(ch===','&&!inQ){r.push(c);c='';}else c+=ch;}
  r.push(c);return r;
}

function addLogRow(type,fname,rows){
  const tbody=document.getElementById('upload-log');
  if(!tbody)return;
  const labels={students:'طلاب',teachers:'معلمون',staff:'كادر إداري'};
  const tr=document.createElement('tr');
  tr.innerHTML=`<td>${labels[type]||type}</td><td>${fname}</td><td>${rows}</td><td>${new Date().toLocaleDateString('ar-QA')}</td><td><span class="chip chip-green">ناجح</span></td>`;
  if(tbody.querySelector('td[colspan]'))tbody.innerHTML='';
  tbody.insertBefore(tr,tbody.firstChild);
}

function dlTemplate(type){
  const a=document.createElement('a');
  a.href='data:text/csv;charset=utf-8,'+encodeURIComponent(TEMPLATES[type]);
  a.download=`template_${type}.csv`;a.click();
  toast('⬇️ تم تحميل القالب','ok');
}

async function renderUsers(){
  document.getElementById('content').innerHTML='<div style="text-align:center;padding:40px;color:var(--text3)">⏳</div>';
  if(!window.$fbReady){document.getElementById('content').innerHTML='<div class="card" style="padding:30px;text-align:center;color:var(--red)">Firebase غير متصل</div>';return;}
  try{
    const snap=await window.$fb.getDocs(window.$fb.collection(window.$db,'users'));
    const users=snap.docs.map(d=>({id:d.id,...d.data()}));
    const roleChip={teacher:'blue',supervisor:'amber',social:'purple',psychologist:'teal',director:'navy',admin:'navy'};
    document.getElementById('content').innerHTML=`<div class="card">
      <div class="card-header"><div class="card-title">المستخدمون المسجلون (${users.length})</div></div>
      ${users.length===0?`<div style="padding:40px;text-align:center;color:var(--text3)">لا يوجد مستخدمون — ارفع بيانات الكادر أولاً</div>`:`
      <table class="tbl"><thead><tr><th>#</th><th>الاسم</th><th>اسم المستخدم</th><th>الدور</th><th>الحالة</th></tr></thead>
      <tbody>${users.map((u,i)=>`<tr>
        <td style="color:var(--text3)">${i+1}</td>
        <td style="font-weight:600">${u.name||'—'}</td>
        <td style="font-family:monospace;font-size:12px">${u.username||u.email||'—'}</td>
        <td><span class="chip chip-${roleChip[u.role]||'navy'}">${u.role||'—'}</span></td>
        <td><span class="chip chip-${u.active!==false?'green':'red'}">${u.active!==false?'نشط':'موقوف'}</span></td>
      </tr>`).join('')}</tbody></table>`}
    </div>`;
  }catch(e){document.getElementById('content').innerHTML=`<div class="card" style="padding:30px;text-align:center;color:var(--red)">خطأ: ${e.message}</div>`;}
}
